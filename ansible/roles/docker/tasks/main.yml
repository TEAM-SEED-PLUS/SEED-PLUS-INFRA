---
- name: Install Docker prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Check if Docker apt repository is configured
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/docker.list
  register: docker_repo_stat

- name: Install Docker CE packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  when: docker_repo_stat.stat.exists

- name: Check if Docker binary exists
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: docker_binary_stat

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
  when: docker_binary_stat.stat.exists

- name: Configure Docker daemon
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart docker
  when: docker_binary_stat.stat.exists

- name: Check if Docker service unit exists
  ansible.builtin.stat:
    path: /lib/systemd/system/docker.service
  register: docker_service_stat

- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: docker_service_stat.stat.exists

- name: Include weekly prune cron task
  ansible.builtin.include_tasks: prune_cron.yml

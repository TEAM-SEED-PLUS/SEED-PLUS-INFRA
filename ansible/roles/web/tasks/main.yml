---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Check if nginx binary exists
  ansible.builtin.stat:
    path: /usr/sbin/nginx
  register: nginx_binary_stat

- name: Create SSL directory for test certificate
  ansible.builtin.file:
    path: /etc/nginx/ssl
    state: directory
    mode: "0700"
    owner: root
    group: root
  when: nginx_binary_stat.stat.exists

- name: Generate self-signed TLS certificate for test deployment
  ansible.builtin.command: >
    openssl req -x509 -nodes -days 365 -newkey rsa:2048
    -keyout /etc/nginx/ssl/test.key
    -out /etc/nginx/ssl/test.crt
    -subj "/CN={{ ansible_hostname }}"
  args:
    creates: /etc/nginx/ssl/test.crt
  notify: Reload nginx
  when: nginx_binary_stat.stat.exists

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx
  when: nginx_binary_stat.stat.exists

- name: Deploy nginx site configuration
  ansible.builtin.template:
    src: nginx_site.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_site_name }}.conf
    mode: "0644"
    # Changed: 임시 http {} 껍데기를 씌워서 문법 검사 (인라인 쉘 스크립트 활용)
    validate: >
      sh -c '
      echo "events {} http { include %s; }" > /tmp/nginx_test.conf && 
      nginx -t -c /tmp/nginx_test.conf
      '
  notify: Reload nginx
  when: nginx_binary_stat.stat.exists

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/{{ nginx_site_name }}.conf
    dest: /etc/nginx/sites-enabled/{{ nginx_site_name }}.conf
    state: link
  notify: Reload nginx
  when: nginx_binary_stat.stat.exists

- name: Check if Docker socket exists
  ansible.builtin.stat:
    path: /var/run/docker.sock
  register: docker_sock_stat

- name: Pull whoami container image
  community.docker.docker_image:
    name: "{{ whoami_container_image }}"
    source: pull
  when: docker_sock_stat.stat.exists

- name: Run whoami test container (loopback-only, fronted by Nginx on port 80)
  community.docker.docker_container:
    name: "{{ whoami_container_name }}"
    image: "{{ whoami_container_image }}"
    state: started
    restart_policy: always
    ports:
      # Bind to loopback only — not exposed directly; Nginx proxies via /test
      - "127.0.0.1:{{ whoami_container_host_port }}:80"
  when: docker_sock_stat.stat.exists

- name: Check if nginx service unit exists
  ansible.builtin.stat:
    path: /lib/systemd/system/nginx.service
  register: nginx_service_stat

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
  when: nginx_service_stat.stat.exists

---
# --- EBS volume setup ---
- name: Install parted
  ansible.builtin.apt:
    name: parted
    state: present

- name: Check if EBS device exists
  ansible.builtin.stat:
    path: "{{ pg_data_device }}"
  register: pg_data_device_stat

- name: Check if EBS device has a partition table
  community.general.parted:
    device: "{{ pg_data_device }}"
    unit: MiB
  register: pg_disk_info
  when: pg_data_device_stat.stat.exists

- name: Create GPT partition on EBS device (first run only)
  community.general.parted:
    device: "{{ pg_data_device }}"
    number: 1
    state: present
    fs_type: ext4
    label: gpt
  when: pg_data_device_stat.stat.exists and pg_disk_info.partitions | length == 0

- name: Set pg_data_partition fact
  ansible.builtin.set_fact:
    pg_data_partition: >-
      {{ pg_data_device }}{{ 'p1' if (pg_data_device | regex_search('nvme')) else '1' }}
  when: pg_data_device_stat.stat.exists

- name: Check if EBS partition device exists
  ansible.builtin.stat:
    path: "{{ pg_data_partition }}"
  register: pg_partition_stat
  when: pg_data_device_stat.stat.exists

- name: Format EBS partition as ext4 (skipped if already formatted)
  community.general.filesystem:
    fstype: ext4
    dev: "{{ pg_data_partition }}"
    force: false
  when: pg_data_device_stat.stat.exists and pg_partition_stat.stat.exists

# Changed: postgres 그룹을 미리 생성 (에러 방지용)
- name: Ensure postgres group exists
  ansible.builtin.group:
    name: postgres
    state: present

# Changed: postgres 유저를 미리 생성 (에러 방지용)
- name: Ensure postgres user exists
  ansible.builtin.user:
    name: postgres
    group: postgres
    system: yes
    state: present

- name: Create PostgreSQL data directory mount point
  ansible.builtin.file:
    path: "{{ pg_data_dir }}"
    state: directory
    mode: "0700"
    owner: postgres
    group: postgres
  when: pg_data_device_stat.stat.exists

- name: Mount EBS partition to data directory (persistent via fstab)
  ansible.posix.mount:
    path: "{{ pg_mount_dir }}"
    src: "{{ pg_data_partition }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted
  when: pg_data_device_stat.stat.exists and pg_partition_stat.stat.exists

# Changed: 마운트 포인트(/mnt/pgdata) 아래에 실제 DB 데이터가 들어갈 하위 디렉터리(/mnt/pgdata/data) 생성
- name: Create PostgreSQL data subdirectory
  ansible.builtin.file:
    path: "{{ pg_data_dir }}"
    state: directory
    mode: "0700"
    owner: postgres
    group: postgres
  when: pg_data_device_stat.stat.exists

# --- PostgreSQL installation ---
- name: Install python3-psycopg2 (required by community.postgresql modules)
  ansible.builtin.apt:
    name: python3-psycopg2
    state: present

- name: Add PGDG GPG key
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/pgdg.asc
    mode: "0644"
    force: false

- name: Add PGDG APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/pgdg.asc]
      https://apt.postgresql.org/pub/repos/apt
      {{ ansible_distribution_release }}-pgdg main
    filename: pgdg
    state: present

# Changed: 설정 파일을 복사하기 전에 목적지 디렉터리가 확실히 존재하도록 생성
- name: Ensure postgresql-common directory exists
  ansible.builtin.file:
    path: /etc/postgresql-common
    state: directory
    mode: "0755"

- name: Prevent default cluster creation before install
  ansible.builtin.copy:
    dest: /etc/postgresql-common/createcluster.conf
    content: |
      create_main_cluster = false
    mode: "0644"
    force: false

- name: Check if PGDG apt repository is configured
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/pgdg.list
  register: pgdg_repo_stat

- name: Install PostgreSQL {{ pg_version }}
  ansible.builtin.apt:
    name:
      - "postgresql-{{ pg_version }}"
      - "postgresql-client-{{ pg_version }}"
    state: present
    update_cache: true
  when: pgdg_repo_stat.stat.exists

- name: Check if PostgreSQL {{ pg_version }} binary exists
  ansible.builtin.stat:
    path: "/usr/lib/postgresql/{{ pg_version }}/bin/postgres"
  register: pg_binary_stat

- name: Check if PostgreSQL cluster is already initialized
  ansible.builtin.stat:
    path: "{{ pg_data_dir }}/PG_VERSION"
  register: pg_initialized
  when: pg_binary_stat.stat.exists

- name: Ensure data directory ownership before cluster creation
  ansible.builtin.file:
    path: "{{ pg_data_dir }}"
    owner: postgres
    group: postgres
    mode: "0700"
    state: directory
  when: pg_binary_stat.stat.exists and pg_data_device_stat.stat.exists

- name: Create PostgreSQL cluster on {{ pg_data_dir }}
  ansible.builtin.command: >
    pg_createcluster {{ pg_version }} {{ pg_cluster_name }}
    --datadir={{ pg_data_dir }}
    --start-conf=auto
  become: true
  become_user: postgres
  when: pg_binary_stat.stat.exists and pg_data_device_stat.stat.exists and not pg_initialized.stat.exists
  changed_when: true

# --- Configuration ---
# Changed: 커스텀 설정 파일이 들어갈 conf.d 디렉터리를 수동으로 먼저 생성
- name: Ensure conf.d directory exists
  ansible.builtin.file:
    path: "/etc/postgresql/{{ pg_version }}/{{ pg_cluster_name }}/conf.d"
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"
  when: pg_binary_stat.stat.exists

- name: Deploy custom PostgreSQL configuration
  ansible.builtin.template:
    src: postgresql_custom.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/{{ pg_cluster_name }}/conf.d/99-seed-plus.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart postgresql
  when: pg_binary_stat.stat.exists

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/{{ pg_cluster_name }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Reload postgresql
  when: pg_binary_stat.stat.exists

- name: Check if PostgreSQL service unit exists
  ansible.builtin.stat:
    path: "/lib/systemd/system/postgresql@.service"
  register: pg_service_stat

- name: Enable and start PostgreSQL service
  ansible.builtin.service:
    name: "postgresql@{{ pg_version }}-{{ pg_cluster_name }}"
    enabled: true
    state: started
  when: pg_service_stat.stat.exists and pg_data_device_stat.stat.exists

# Flush handlers so PostgreSQL is running before we create DB/users
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

# --- Database and user ---
- name: Create application database user
  community.postgresql.postgresql_user:
    name: "{{ pg_db_user }}"
    password: "{{ pg_password }}"
    state: present
  become: true
  become_user: postgres
  when: pg_binary_stat.stat.exists and pg_data_device_stat.stat.exists

- name: Create application database
  community.postgresql.postgresql_db:
    name: "{{ pg_db_name }}"
    owner: "{{ pg_db_user }}"
    state: present
  become: true
  become_user: postgres
  when: pg_binary_stat.stat.exists and pg_data_device_stat.stat.exists

# --- Logical backup cron ---
- name: Schedule daily pg_dump logical backup
  ansible.builtin.cron:
    name: pg_dump daily backup
    user: postgres
    minute: "30"
    hour: "2"
    job: >-
      pg_dump -p {{ db_port }} {{ pg_db_name }}
      | gzip > {{ pg_data_dir }}/backup/{{ pg_db_name }}_$(date +\%F).sql.gz
      && find {{ pg_data_dir }}/backup -name '*.sql.gz' -mtime +7 -delete
  when: pg_binary_stat.stat.exists and pg_data_device_stat.stat.exists

- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ pg_data_dir }}/backup"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  when: pg_binary_stat.stat.exists and pg_data_device_stat.stat.exists

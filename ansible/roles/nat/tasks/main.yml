---
# --- SWAP ---
- name: Check if swap is already active
  ansible.builtin.command: swapon --show
  register: swap_status
  changed_when: false

- name: Create swapfile
  ansible.builtin.command: fallocate -l 1G /swapfile
  when: not swap_status.stdout
  changed_when: true

- name: Set swapfile permissions
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"
  when: not swap_status.stdout

- name: Format swapfile
  ansible.builtin.command: mkswap /swapfile
  when: not swap_status.stdout
  changed_when: true

- name: Enable swapfile
  ansible.builtin.command: swapon /swapfile
  when: not swap_status.stdout
  changed_when: true

- name: Persist swapfile in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    regexp: "^/swapfile"
    state: present

- name: Set vm.swappiness to 10
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    sysctl_file: /etc/sysctl.d/99-swap.conf
    reload: true
    state: present

# --- NAT ---
- name: Detect primary network interface
  ansible.builtin.set_fact:
    nat_interface: "{{ nat_interface | default(ansible_default_ipv4.interface) }}"

- name: Apply sysctl NAT forwarding settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value | string }}"
    sysctl_file: /etc/sysctl.d/99-nat.conf
    reload: true
    state: present
  loop:
    - {key: "net.ipv4.ip_forward", value: "1"}
    - {key: "net.ipv4.conf.all.send_redirects", value: "0"}
    - {key: "net.ipv4.conf.default.send_redirects", value: "0"}
    - {key: "net.ipv4.conf.all.accept_redirects", value: "0"}
    - {key: "net.ipv4.conf.default.accept_redirects", value: "0"}

- name: Install iptables-persistent
  ansible.builtin.apt:
    name:
      - iptables-persistent
      - netfilter-persistent
    state: present

# --- INPUT chain ---
- name: Allow ESTABLISHED/RELATED inbound
  ansible.builtin.iptables:
    chain: INPUT
    ctstate: [ESTABLISHED, RELATED]
    jump: ACCEPT
    state: present

- name: Allow loopback inbound
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT
    state: present

- name: Allow SSH inbound (new connections)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "22"
    ctstate: [NEW]
    jump: ACCEPT
    state: present

# --- OUTPUT chain ---
- name: Allow ESTABLISHED/RELATED outbound
  ansible.builtin.iptables:
    chain: OUTPUT
    ctstate: [ESTABLISHED, RELATED]
    jump: ACCEPT
    state: present

- name: Allow loopback outbound
  ansible.builtin.iptables:
    chain: OUTPUT
    out_interface: lo
    jump: ACCEPT
    state: present

- name: Allow HTTPS outbound (SSM Agent)
  ansible.builtin.iptables:
    chain: OUTPUT
    protocol: tcp
    destination_port: "443"
    jump: ACCEPT
    state: present

- name: Allow DNS outbound (UDP)
  ansible.builtin.iptables:
    chain: OUTPUT
    protocol: udp
    destination_port: "53"
    jump: ACCEPT
    state: present

- name: Allow DNS outbound (TCP)
  ansible.builtin.iptables:
    chain: OUTPUT
    protocol: tcp
    destination_port: "53"
    jump: ACCEPT
    state: present

- name: Allow HTTP outbound (apt)
  ansible.builtin.iptables:
    chain: OUTPUT
    protocol: tcp
    destination_port: "80"
    jump: ACCEPT
    state: present


- name: Allow SSH outbound to private subnets (ProxyJump)
  ansible.builtin.iptables:
    chain: OUTPUT
    protocol: tcp
    destination_port: "22"
    destination: "{{ item }}"
    jump: ACCEPT
    state: present
  loop: "{{ private_cidrs }}"

# --- FORWARD chain ---
- name: Allow ESTABLISHED/RELATED forward
  ansible.builtin.iptables:
    chain: FORWARD
    ctstate: [ESTABLISHED, RELATED]
    jump: ACCEPT
    state: present

- name: Allow HTTP forward from private subnets
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ nat_interface }}"
    source: "{{ item }}"
    protocol: tcp
    destination_port: "80"
    jump: ACCEPT
    state: present
  loop: "{{ private_cidrs }}"

- name: Allow HTTPS forward from private subnets
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ nat_interface }}"
    source: "{{ item }}"
    protocol: tcp
    destination_port: "443"
    jump: ACCEPT
    state: present
  loop: "{{ private_cidrs }}"

# --- NAT table ---
- name: Add MASQUERADE for private subnets
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ item }}"
    out_interface: "{{ nat_interface }}"
    jump: MASQUERADE
    state: present
  loop: "{{ private_cidrs }}"

# Drop policies run last via handler — all ACCEPT rules must be in place first
- name: Trigger default DROP policy handler
  ansible.builtin.debug:
    msg: "Applying default DROP policies after all ACCEPT rules"
  changed_when: true
  notify: Apply default drop policies

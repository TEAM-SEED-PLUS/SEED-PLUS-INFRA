---
hostname: "seed-plus-dev-db"

# ProxyJump via NAT instance for SSH access from control node
ansible_ssh_common_args: >-
  -o ProxyCommand="ssh -i ~/.ssh/seed-plus-dev-key.pem
  -o StrictHostKeyChecking=no -W %h:%p ubuntu@{{ nat_eip }}"

pg_version: "17"
pg_data_dir: /mnt/pgdata
pg_data_device: /dev/nvme1n1
pg_cluster_name: main

pg_db_name: seedplus
pg_db_user: seedplus
pg_password: "{{ vault_pg_password }}"

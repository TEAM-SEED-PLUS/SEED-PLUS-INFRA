---
# Static fallback inventory — use when AWS API is unreachable (CI, offline).
# Run 'make ansible-sync' to populate IPs from Terraform state.
# Group names mirror the dynamic inventory's keyed_groups output.
all:
  children:
    tier_web:
      hosts:
        seed-plus-dev-web:
          ansible_host: "{{ web_eip }}"

    tier_app:
      hosts:
        seed-plus-dev-app:
          ansible_host: "{{ app_private_ip }}"

    tier_db:
      hosts:
        seed-plus-dev-db:
          ansible_host: "{{ db_private_ip }}"

    role_nat_instance:
      hosts:
        seed-plus-dev-nat:
          ansible_host: "{{ nat_eip }}"

---
# Static fallback inventory — use when AWS API is unreachable (CI, offline).
# Run 'make ansible-sync' to populate IPs from Terraform state.
# Group names mirror the dynamic inventory's keyed_groups output.
all:
  children:
    tier_web:
      hosts:
        seed-plus-dev-web:
          ansible_host: REPLACE_WITH_WEB_EIP

    tier_app:
      hosts:
        seed-plus-dev-app:
          ansible_host: REPLACE_WITH_APP_PRIVATE_IP

    tier_db:
      hosts:
        seed-plus-dev-db:
          ansible_host: REPLACE_WITH_DB_PRIVATE_IP

    role_nat_instance:
      hosts:
        seed-plus-dev-nat:
          ansible_host: REPLACE_WITH_NAT_EIP

---
- name: Configure web tier instance
  hosts: tier_web
  become: true
  gather_facts: true
  roles:
    - role: common
      tags: [bootstrap, common]
    - role: docker
      tags: [docker]
    - role: web
      tags: [web, nginx]
    - role: fail2ban
      tags: [hardening, fail2ban]
    - role: cloudwatch_agent
      tags: [monitoring, cloudwatch]
      vars:
        cwa_extra_logs:
          - file_path: "/var/log/nginx/access.log"
            log_group_name: "{{ cwa_log_group_prefix }}/{{ hostname }}/nginx-access"
          - file_path: "/var/log/nginx/error.log"
            log_group_name: "{{ cwa_log_group_prefix }}/{{ hostname }}/nginx-error"

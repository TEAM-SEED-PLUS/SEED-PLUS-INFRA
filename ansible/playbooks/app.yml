---
- name: Configure app tier instance
  hosts: tier_app
  become: true
  gather_facts: true
  roles:
    - role: common
      tags: [bootstrap, common]
    - role: docker
      tags: [docker]
    - role: app
      tags: [app]
    - role: cloudwatch_agent
      tags: [monitoring, cloudwatch]
      vars:
        cwa_extra_logs: []
